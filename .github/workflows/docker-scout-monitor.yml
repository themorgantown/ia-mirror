name: Docker Scout Monthly Monitor

on:
  schedule:
    # Run at 06:00 UTC on the 1st of every month
    - cron: '0 6 1 * *'
  workflow_dispatch:

jobs:
  scan-and-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write # Required to create issues

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install Docker Scout CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/docker/scout-cli/main/install.sh | sh

      - name: Build Docker image
        run: |
          # Build the image locally so Scout can analyze it
          docker buildx build --load -f docker/Dockerfile -t ia-mirror:scout docker

      - name: Run Docker Scout
        id: scout
        run: |
          image_ref="local://ia-mirror:scout"
          vuln_report="scout-cves.md"
          recommendations_report="scout-recommendations.txt"

          # Initialize report file
          echo "# Docker Scout Monthly Report" > scout-report.md
          echo "Scan Date: $(date -u)" >> scout-report.md
          echo "" >> scout-report.md

          # 1. Check for High/Critical Vulnerabilities
          # --exit-code returns non-zero if vulns are found
          echo "## 🚨 Vulnerabilities (High/Critical)" >> scout-report.md

          if docker scout cves "$image_ref" \
            --only-severity high,critical \
            --exit-code \
            --format markdown \
            --output "$vuln_report"; then
            echo "No high or critical vulnerabilities found." >> scout-report.md
            echo "vulns_found=false" >> "$GITHUB_OUTPUT"
          else
            scout_status=$?
            if [ "$scout_status" -ne 2 ]; then
              echo "Docker Scout CVE scan failed with exit code $scout_status" >&2
              exit "$scout_status"
            fi
            cat "$vuln_report" >> scout-report.md
            echo "vulns_found=true" >> "$GITHUB_OUTPUT"
          fi

          echo "" >> scout-report.md

          # 2. Check for Base Image Recommendations
          echo "## 🐳 Base Image Recommendations" >> scout-report.md
          echo '```text' >> scout-report.md
          if docker scout recommendations "$image_ref" > "$recommendations_report"; then
            if [ -s "$recommendations_report" ]; then
              cat "$recommendations_report" >> scout-report.md
            else
              echo "No base image recommendations." >> scout-report.md
            fi
          else
            scout_status=$?
            echo "Docker Scout recommendations failed with exit code $scout_status." >> scout-report.md
          fi
          echo '```' >> scout-report.md

      - name: Create GitHub Issue
        if: steps.scout.outputs.vulns_found == 'true'
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710  # v6.0.0
        with:
          title: "Security Alert: High Vulnerabilities Detected in Docker Image"
          content-filepath: scout-report.md
          labels: |
            security
            automated-report
          assignees: ${{ github.actor }}
