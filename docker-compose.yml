services:
  ia-mirror:
    container_name: ia-mirror-app
    build:
      context: docker
      dockerfile: Dockerfile
    ports:
      - "17865:17865"  # Web UI (http://localhost:17865)
    volumes:
      - ${DOWNLOAD_DIR:-./downloads}:/downloads  # Media files — set DOWNLOAD_DIR in .env to change host path
      - ${DATA_DIR:-./data}:/data                # Database/Metadata
    environment:
      - DOWNLOAD_DIR=${DOWNLOAD_DIR:-./downloads}
    env_file:
      # docker/example.env is a reference template only.
      # Put real overrides in docker/live.env; it is ignored if missing.
      - path: ./docker/live.env
        required: false

    # Runtime mode:
    # - Web UI is the default. You do not need IA_IDENTIFIER to open the UI;
    #   paste item IDs or archive.org/details/... URLs into the browser.
    # - Blank/missing IA_IDENTIFIER is OK for Web UI mode.
    # - Do not use IA_IDENTIFIER=example_item. It is placeholder text; real Web UI
    #   jobs reject it, and CLI mode may try to download it as if it were real.
    #
    # For direct CLI mode, add these to docker/live.env or pass them with
    # `docker compose run --rm -e ... ia-mirror`:
    #   WEB_ENABLED=false
    #   IA_IDENTIFIER=The_Babe_Ruth_Collection
    #   IA_DRY_RUN=1
    #
    # Optional per-job defaults for the Web UI can also go in docker/live.env:
    #   IA_DRY_RUN=1
    #   IA_CONCURRENCY=5
    #   IA_CHECKSUM=1
